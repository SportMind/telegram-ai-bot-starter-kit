#     send_message(chat_id, reply, parse_mode="Markdown")
#
# ── FRAMEWORK REFERENCES ─────────────────────────────────────────────────────
# python-telegram-bot  https://python-telegram-bot.org          (Python)
# grammY               https://grammy.dev                       (Node.js/Deno)
# telegraf             https://telegraf.js.org                  (Node.js)
# aiogram              https://aiogram.dev                      (Python/asyncio)
#
# All four support webhook and polling modes and the full Bot API surface
# required for Managed Bots.
