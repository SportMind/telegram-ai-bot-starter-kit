#
# STEP 3: Call LLM
#     messages = [
#       { role: "system",    content: system_prompt },
#       ...history,
#       { role: "user",      content: user_text }
#     ]
#     response = POST llm.base_url + "/chat/completions"
#                with { model, max_tokens, temperature, messages }
